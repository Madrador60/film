<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#050713" />
  <meta name="application-name" content="Madrador TV" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Madrador TV" />
  <title>Détails - Madrador TV</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" type="image/png" href="./assets/madrador-logo.png" />
  <link rel="apple-touch-icon" href="./assets/madrador-logo.png" />
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body class="details-body">
  <div class="backdrop" id="detailBackdrop"></div>
  <div class="backdrop-overlay"></div>

  <header class="player-top">
    <a href="./index.html" class="btn glass"><i class="fa-solid fa-arrow-left"></i><span>Retour</span></a>
    <a href="./index.html" class="brand mini">
      <span class="brand-logo"><img src="./assets/madrador-logo.png" alt=""></span>
      <b>MADRADOR <em>TV</em></b>
    </a>
  </header>

  <main class="details-shell">
    <section class="details-hero">
      <div class="details-poster" id="detailPoster"><i class="fa-solid fa-film"></i></div>
      <article class="details-copy">
        <div class="eyebrow" id="detailType"><i class="fa-solid fa-circle-play"></i> Détail</div>
        <h1 id="detailTitle">Chargement...</h1>
        <div class="media-meta" id="detailMeta"></div>
        <div class="genre-list" id="detailGenres"></div>
        <p class="synopsis" id="detailDesc">Merci de patienter.</p>
        <div class="player-actions">
          <button class="btn primary big" id="detailWatch"><i class="fa-solid fa-play"></i><span>Regarder</span></button>
          <button class="btn glass big hidden" id="detailTrailer"><i class="fa-solid fa-clapperboard"></i><span>Bande-annonce</span></button>
          <button class="btn glass big" id="detailFavorite"><i class="fa-regular fa-heart"></i><span>Ma liste</span></button>
          <button class="btn glass big" id="detailShare"><i class="fa-solid fa-link"></i><span>Copier le lien</span></button>
        </div>
      </article>
    </section>

    <section class="details-action-strip" id="detailActionStrip" aria-label="Actions rapides">
      <button class="detail-action-card" type="button" data-detail-action="watch">
        <i class="fa-solid fa-play"></i>
        <span>
          <b>Regarder</b>
          <small>Source préférée automatique</small>
        </span>
      </button>
      <button class="detail-action-card" type="button" data-detail-action="favorite">
        <i class="fa-regular fa-heart"></i>
        <span>
          <b>Ma liste</b>
          <small>Ajouter ou retirer ce contenu</small>
        </span>
      </button>
      <button class="detail-action-card" type="button" data-detail-action="explore">
        <i class="fa-solid fa-compass"></i>
        <span>
          <b>Explorer</b>
          <small>Contenus similaires</small>
        </span>
      </button>
      <button class="detail-action-card" type="button" data-detail-action="trailer" disabled>
        <i class="fa-solid fa-clapperboard"></i>
        <span>
          <b>Bande-annonce</b>
          <small>Indisponible</small>
        </span>
      </button>
    </section>

    <section class="details-grid">
      <article class="details-panel hidden" id="detailsSeriesPanel">
        <div class="section-head compact">
          <div>
            <span>Série</span>
            <h2>Saisons disponibles</h2>
          </div>
          <div class="page-pill" id="detailSeasonCount">0</div>
        </div>
        <div class="detail-seasons" id="detailSeasons"></div>
      </article>

      <article class="details-panel" id="detailsInfoPanel">
        <div class="section-head compact">
          <div>
            <span>Fiche</span>
            <h2>Informations</h2>
          </div>
        </div>
        <div class="detail-info-grid" id="detailInfoGrid"></div>
      </article>

      <article class="details-panel">
        <div class="section-head compact">
          <div>
            <span>Lecture</span>
            <h2>Reprendre</h2>
          </div>
        </div>
        <div class="resume-card" id="resumeCard">
          <i class="fa-solid fa-play"></i>
          <strong>Prêt à regarder</strong>
          <p>Le lecteur choisira automatiquement ta source préférée.</p>
        </div>
      </article>
    </section>

    <section class="details-panel">
      <div class="section-head compact">
        <div>
          <span>Suggestions</span>
          <h2>À regarder aussi</h2>
        </div>
      </div>
      <div class="suggestion-grid" id="suggestions"></div>
    </section>
  </main>

  <div class="trailer-modal hidden" id="detailTrailerModal" role="dialog" aria-modal="true" aria-label="Bande-annonce">
    <div class="trailer-card">
      <button class="icon-btn close-modal" id="detailCloseTrailer" aria-label="Fermer"><i class="fa-solid fa-xmark"></i></button>
      <a class="btn glass trailer-external" id="detailTrailerExternal" href="#" target="_blank" rel="noopener noreferrer" data-allow-popup="true">
        <i class="fa-brands fa-youtube"></i><span>Ouvrir sur YouTube</span>
      </a>
      <iframe id="detailTrailerFrame" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen referrerpolicy="strict-origin-when-cross-origin" sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"></iframe>
    </div>
  </div>

  <div class="toast hidden" id="toast" role="status" aria-live="polite"></div>

  <nav class="mobile-bottom-nav">
    <a href="./index.html"><i class="fa-solid fa-house"></i><span>Accueil</span></a>
    <a href="./search.html"><i class="fa-solid fa-magnifying-glass"></i><span>Recherche</span></a>
    <a href="./catalog.html?type=movies"><i class="fa-solid fa-film"></i><span>Films</span></a>
    <a href="./catalog.html?type=series"><i class="fa-solid fa-tv"></i><span>Séries</span></a>
    <a href="./settings.html"><i class="fa-solid fa-gear"></i><span>Réglages</span></a>
  </nav>

  <script src="./js/storage.js"></script>
  <script src="./js/antiads.js"></script>
  <script src="./js/mini-player.js"></script>
  <script src="./js/mobile-nav.js"></script>
  <script src="./js/details.js"></script>
</body>
</html>
