<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Admin - Madrador TV</title>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/pro-ui.css">
</head>
<body class="pro-ready">
  <main class="pro-shell">
    <a class="pro-btn" href="./index.html">← Accueil</a>
    <h1>Dashboard Admin</h1>
    <div class="pro-actions">
      <button class="pro-btn" id="refresh">Actualiser</button>
      <button class="pro-btn" id="refreshDomain">Rafraîchir domaine</button>
    </div>
    <section id="stats" class="pro-admin-grid"></section>
    <pre id="raw" class="pro-glass" style="padding:18px;border-radius:18px;overflow:auto;margin-top:20px"></pre>
  </main>
  <script>
    async function api(url, opts){
      const r = await fetch(url, opts);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    }
    async function load(){
      const [status, stats] = await Promise.allSettled([api('/api/status'), api('/api/library/stats')]);
      const s = status.status === 'fulfilled' ? status.value : {};
      const l = stats.status === 'fulfilled' ? stats.value : {};
      document.querySelector('#stats').innerHTML = [
        ['Domaine actif', s.source || l.source || '-'],
        ['Films', l.movies ?? '-'],
        ['Séries', l.series ?? '-'],
        ['Cache serveur', s.cacheSize ?? l.cacheSize ?? '-'],
        ['Uptime', s.uptime ? Math.round(s.uptime)+'s' : '-'],
        ['RAM', s.memory ? Math.round(s.memory.rss/1024/1024)+' MB' : '-']
      ].map(x => `<div class="pro-admin-card pro-glass"><span>${x[0]}</span><b>${x[1]}</b></div>`).join('');
      document.querySelector('#raw').textContent = JSON.stringify({
        status: status.status === 'fulfilled' ? s : { ok:false, error: status.reason?.message || 'Indisponible' },
        stats: stats.status === 'fulfilled' ? l : { ok:false, error: stats.reason?.message || 'Indisponible' }
      }, null, 2);
    }
    document.querySelector('#refresh').onclick = load;
    document.querySelector('#refreshDomain').onclick = async () => { await api('/api/refresh-domain', {method:'POST'}); load(); };
    load();
  </script>
</body>
</html>
